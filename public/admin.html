<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARTIK Admin</title>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top left, rgba(255,0,98,0.18), transparent 28%), #040714;
      color: #fff;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 26px 16px 50px;
    }

    .card {
      background: rgba(9, 18, 48, 0.94);
      border: 1px solid rgba(82, 109, 176, 0.25);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 18px 55px rgba(0,0,0,0.34);
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 44px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 28px;
    }

    p {
      color: #c4d2ee;
      font-size: 20px;
      line-height: 1.6;
    }

    label {
      display: block;
      margin: 16px 0 8px;
      font-size: 20px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(88, 113, 177, 0.34);
      background: rgba(7, 13, 30, 0.94);
      color: #fff;
      font-size: 18px;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 20px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(90deg, #ff245c, #ff4f8a);
      color: #fff;
      font-size: 24px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 20px 40px rgba(255, 36, 92, 0.28);
    }

    .status {
      margin-top: 16px;
      background: rgba(5, 12, 34, 0.82);
      border: 1px solid rgba(83, 106, 163, 0.28);
      border-radius: 18px;
      padding: 18px;
      font-size: 20px;
    }

    /* 🔥 DONATE ADMIN */

    .donate-item {
      background: rgba(6,12,30,0.9);
      border: 1px solid rgba(88,113,177,0.3);
      border-radius: 16px;
      padding: 14px;
      margin-top: 10px;
    }

    .donate-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .btn-small {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border-radius: 12px;
      cursor: pointer;
      border: none;
    }

    .approve {
      background: linear-gradient(90deg, #16a34a, #22c55e);
    }

    .delete {
      background: linear-gradient(90deg, #ef4444, #f87171);
    }
  </style>
</head>

<body>

<div class="wrap">

  <!-- 🔴 ТВОЯ СИСТЕМА ЭФИРА -->
  <div class="card">
    <h1>Керування ефіром</h1>

    <label>Пароль</label>
    <input id="secret" type="password">

    <label>Посилання</label>
    <input id="url" type="url">

    <label>Заголовок</label>
    <input id="title" type="text" value="🔴 ARTIK в ефірі">

    <label>Текст</label>
    <input id="body" type="text" value="Натисни, щоб перейти в ефір">

    <button id="sendBtn">Я в ефірі 🔴</button>
    <div class="status" id="adminStatus">Готово</div>
  </div>

  <!-- 💻 ДОНАТЫ -->
  <div class="card">
    <h2>💻 Донати (очікують підтвердження)</h2>
    <div id="donateList"></div>
  </div>

</div>

<script>

document.getElementById('sendBtn').onclick = async () => {
  const status = document.getElementById('adminStatus');

  const resp = await fetch('/notify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      secret: document.getElementById('secret').value,
      url: document.getElementById('url').value,
      title: document.getElementById('title').value,
      body: document.getElementById('body').value
    })
  });

  if (resp.status === 403) {
    status.innerHTML = '❌ Невірний пароль';
    return;
  }

  status.innerHTML = '✅ Відправлено';
};

async function loadDonates() {
  const res = await fetch('/admin/donations');
  const data = await res.json();

  const list = document.getElementById('donateList');

  if (!data.length) {
    list.innerHTML = 'Пусто';
    return;
  }

  list.innerHTML = data.map(d => `
    <div class="donate-item">
      <b>${d.name}</b> — ${d.amount} грн
      <div class="donate-actions">
        <button class="btn-small approve" onclick="approve(${d.id})">Підтвердити</button>
        <button class="btn-small delete" onclick="removeDonate(${d.id})">Видалити</button>
      </div>
    </div>
  `).join('');
}

async function approve(id) {
  await fetch('/admin/approve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });

  loadDonates();
}

async function removeDonate(id) {
  await fetch('/admin/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });

  loadDonates();
}

loadDonates();

</script>

</body>
</html>
