<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE</title>
<link rel="manifest" href="/manifest.webmanifest">
<style>
body {background:#0f0f0f;color:white;text-align:center;font-family:sans-serif;}
.btn {background:linear-gradient(45deg,#ff0050,#ff3c7a);padding:15px;border-radius:12px;margin:10px;}
.live {color:red;animation:pulse 1s infinite;}
@keyframes pulse {0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
</style>
</head>
<body>

<h1 class="live">🔴 LIVE</h1>

<div class="btn" onclick="subscribe()">Увімкнути сповіщення</div>

<p>📱 Android: Chrome → дозволити</p>
<p>🍎 iPhone: Safari → На екран → відкрити → дозволити</p>

<a class="btn" target="_blank">Перейти в ефір</a>

<script>
if(/Telegram/i.test(navigator.userAgent)){
 document.body.innerHTML='<h2>Відкрий у браузері</h2>';
}

async function subscribe(){
 const reg = await navigator.serviceWorker.register('/sw.js');
 const sub = await reg.pushManager.subscribe({
  userVisibleOnly:true,
  applicationServerKey: 'BIPSNPpNdxQaUs6PBPo_IQsD5paX5GgsrCTO7dmPv_osSR_VIvzTHbXhuabkN1qVzdecOUZaQzrTDNjZCXcOaHE'
 });

 await fetch('/subscribe',{
  method:'POST',
  body:JSON.stringify(sub),
  headers:{'Content-Type':'application/json'}
 });

 alert('Підключено');
}
</script>

</body>
</html>
