<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTIK LIVE</title>
<style>
body{font-family:sans-serif;background:#050816;color:#fff;margin:0;text-align:center}
.wrap{max-width:600px;margin:auto;padding:20px}
.card{background:#0f172a;padding:20px;border-radius:15px;margin-top:15px}
.btn{padding:15px;margin:10px;width:100%;border:none;border-radius:10px;font-size:18px}
.red{background:#ff2d55;color:#fff}
.blue{background:#2563eb;color:#fff}
.hide{display:none}
img{width:140px;border-radius:50%}
</style>
</head>
<body>
<div class="wrap">

<div id="setup">
<img src="/artik.jpg">
<h2>ARTIK</h2>
<p>Привіт 👋 Підключи сповіщення щоб не пропускати ефіри 🔴</p>

<button class="btn red" onclick="subscribe()">Увімкнути сповіщення</button>
<button class="btn blue" id="installBtn" style="display:none">Встановити застосунок 📲</button>

<div class="card">
<b>iPhone</b><br>
Safari → Поділитися → На екран → відкрити → увімкнути
</div>

<div class="card">
<b>Android</b><br>
Chrome → Встановити застосунок → відкрити → увімкнути
</div>
</div>

<div id="done" class="hide">
<h2>✅ Сповіщення увімкнено</h2>
<a href="https://vt.tiktok.com/ZS9L7DfHMTgbR-ieGCG/" class="btn blue">Перейти в ефір</a>
<button class="btn red" onclick="unsubscribe()">Вимкнути сповіщення</button>
<button class="btn" onclick="showSetup()">Показати інструкцію</button>
</div>

</div>

<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', e=>{
e.preventDefault();
deferredPrompt=e;
document.getElementById('installBtn').style.display='block';
});

document.getElementById('installBtn').onclick=async ()=>{
if(deferredPrompt) deferredPrompt.prompt();
};

function showSetup(){
localStorage.removeItem('sub');
location.reload();
}

function subscribe(){
localStorage.setItem('sub','1');
document.getElementById('setup').classList.add('hide');
document.getElementById('done').classList.remove('hide');
}

function unsubscribe(){
localStorage.removeItem('sub');
location.reload();
}

if(localStorage.getItem('sub')){
document.getElementById('setup').classList.add('hide');
document.getElementById('done').classList.remove('hide');
}
</script>

</body>
</html>
