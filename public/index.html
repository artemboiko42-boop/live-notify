<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTIK LIVE</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#040714">

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial;
background:
radial-gradient(circle at top left, rgba(255,0,98,0.18), transparent 28%),
radial-gradient(circle at top right, rgba(0,221,255,0.13), transparent 24%),
#040714;
color:#fff;
}
.wrap{max-width:760px;margin:0 auto;padding:24px 16px 56px}
.hero{text-align:center;margin-bottom:22px}

.live-badge{
background:linear-gradient(90deg,#ff245c,#ff4f8a);
padding:10px 18px;
border-radius:999px;
font-weight:800;
display:inline-block;
margin-bottom:16px;
animation:blink 1s infinite alternate;
}
@keyframes blink{from{opacity:1}to{opacity:.5}}

.title{font-size:42px;font-weight:900;margin-bottom:10px}

.card{
background:rgba(9,18,48,0.94);
border-radius:24px;
padding:20px;
margin-bottom:16px;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:20px;
font-weight:800;
font-size:20px;
margin-top:12px;
cursor:pointer;
}

.btn-live{
background:#00d5ff;
color:#000;
animation:pulse .8s infinite alternate;
}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.05)}}

.btn-main{background:#ff245c;color:#fff}
.btn-share{background:#7c3aed}
.btn-win{background:#f59e0b}
.btn-lose{background:#ef4444}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:12px;
}

.status{
margin-top:12px;
background:#111;
padding:12px;
border-radius:12px;
}

.hidden{display:none}
</style>
</head>

<body>
<div class="wrap">

<div class="hero">
<div class="live-badge">● LIVE</div>
<div class="title">ARTIK LIVE</div>
</div>

<div class="card">

<button class="btn btn-main" id="subscribeBtn">
УВІМКНУТИ СПОВІЩЕННЯ
</button>

<div class="status" id="status">Ще не підключено</div>

<a class="btn btn-live" id="liveLink" target="_blank">
ПЕРЕЙТИ В ЕФІР
</a>

<button class="btn btn-share" id="shareBtn">
ПОДІЛИТИСЯ 🔗
</button>

</div>

<div id="connectedView" class="card hidden">

<div>✅ Сповіщення увімкнено</div>

<a class="btn btn-live" id="liveLinkCompact" target="_blank">
ПЕРЕЙТИ В ЕФІР
</a>

<div class="row">
<button class="btn btn-win" id="battleWinBtn">
ЗАБРАТИ ВІНИ
</button>

<button class="btn btn-lose" id="battleLoseBtn">
ВТРАЧАЄМО ВІНИ
</button>
</div>

<button class="btn btn-main" id="unsubscribeBtn">
ВИМКНУТИ СПОВІЩЕННЯ
</button>

</div>

</div>

<script>
const PUBLIC_KEY = 'BIPSNPpNdxQaUs6PBPo_IQsD5paX5GgsrCTO7dmPv_osSR_VIvzTHbXhuabkN1qVzdecOUZaQzrTDNjZCXcOaHE';

const statusBox = document.getElementById('status');
const subscribeBtn = document.getElementById('subscribeBtn');
const unsubscribeBtn = document.getElementById('unsubscribeBtn');

const liveLink = document.getElementById('liveLink');
const liveLinkCompact = document.getElementById('liveLinkCompact');

const connectedView = document.getElementById('connectedView');

const battleWinBtn = document.getElementById('battleWinBtn');
const battleLoseBtn = document.getElementById('battleLoseBtn');

const shareBtn = document.getElementById('shareBtn');

function urlBase64ToUint8Array(base64String){
const padding='='.repeat((4-base64String.length%4)%4);
const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
const rawData=atob(base64);
return Uint8Array.from([...rawData].map(c=>c.charCodeAt(0)));
}

function showConnected(){
connectedView.classList.remove('hidden');
localStorage.setItem('sub','1');
}

if(localStorage.getItem('sub')==='1'){
showConnected();
}

fetch('/config')
.then(r=>r.json())
.then(d=>{
liveLink.href=d.liveUrl;
liveLinkCompact.href=d.liveUrl;
});

subscribeBtn.onclick = async () => {
try{
const reg = await navigator.serviceWorker.register('/sw.js');
let sub = await reg.pushManager.getSubscription();

if(!sub){
sub = await reg.pushManager.subscribe({
userVisibleOnly:true,
applicationServerKey:urlBase64ToUint8Array(PUBLIC_KEY)
});
}

await fetch('/subscribe',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(sub)
});

statusBox.innerHTML='✅ Підключено';
showConnected();

}catch(e){
statusBox.innerHTML='❌ Помилка';
}
};

unsubscribeBtn.onclick = () => {
localStorage.removeItem('sub');
location.reload();
};

async function sendBattle(type){
const r = await fetch('/notify-battle',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({type})
});
const d = await r.json();
alert(d.message);
}

battleWinBtn.onclick = ()=>sendBattle('win');
battleLoseBtn.onclick = ()=>sendBattle('lose');

shareBtn.onclick = async ()=>{
if(navigator.share){
await navigator.share({
title:'ARTIK LIVE',
url:window.location.origin
});
}else{
navigator.clipboard.writeText(window.location.origin);
alert('Скопійовано');
}
};
</script>

</body>
</html>
